# Mirrors the vite.config.js proxy rules — most-specific prefixes win (nginx
# longest-prefix matching): /api/backend → gateway, /api/agents → extract agent,
# /api/matches → ai-data-platform (keeps its /matches prefix), /api fallback → gateway.
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # /api/backend/foo → gateway /foo
    location /api/backend/ {
        proxy_pass http://gateway:3000/;
        proxy_set_header Host $host;
    }

    # /api/agents/foo → extract agent /foo
    location /api/agents/ {
        proxy_pass http://extract:3003/;
        proxy_set_header Host $host;
    }

    # /api/matches[...] → ai-data-platform /matches[...] (only /api is stripped).
    # Replaces the retired matching-engine: the platform serves the RAG/GraphRAG matches
    # (GET /matches/founders/:userId/investors self-fetches the profile from extracted_profiles).
    location /api/matches {
        proxy_pass http://ai-data-platform:8000/matches;
        proxy_set_header Host $host;
    }

    # /api/foo → gateway /foo
    location /api/ {
        proxy_pass http://gateway:3000/;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
